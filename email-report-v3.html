<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Email Report v2.1.6</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Inter,sans-serif;
background:#0f172a;
color:#f8fafc;
padding:30px;
}

.wrapper{max-width:1400px;margin:auto;}

.topbar{
display:flex;
gap:10px;
align-items:center;
margin-bottom:20px;
position:sticky;
top:0;
z-index:100;
background:#0f172a;
padding:10px 0;
}

.search{
padding:10px 14px;
border-radius:8px;
border:none;
font-size:14px;
width:260px;
}

h2{margin-top:40px;margin-bottom:15px;font-weight:700;}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:12px;
overflow:hidden;
margin-bottom:40px;
}

thead{background:#334155;}

th{padding:14px;text-align:center;font-size:13px;font-weight:600;}
td{padding:14px;font-size:13px;}

.row-contract{background:#facc15;color:#000;}
.row-discussion{background:#1f4e79;}
.row-inactive{background:#7f2d2d;}
.row-other{background:#1e293b;}
.row-signed{background:#16a34a;color:white;}

.partner-row{
display:grid;
grid-template-columns:320px 1fr;
gap:16px;
padding:14px;
}

.partner-info{
background:#0f172a;
padding:14px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:6px;
color:white;
}

.partner-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.partner-company{font-weight:700;font-size:14px;}
.partner-country{font-size:12px;opacity:.7;}
.partner-contact{font-size:13px;}
.partner-phone{font-size:13px;opacity:.9;}

.partner-brands{
display:flex;
flex-wrap:wrap;
gap:6px;
align-content:flex-start;
}

.brand-tag{
background:#0f172a;
border:1px solid rgba(255,255,255,.12);
padding:6px 10px;
border-radius:8px;
font-size:12px;
display:inline-flex;
gap:6px;
color:white;
}

.brand-price{color:#38bdf8;font-weight:700;}

.copy-btn{
padding:10px 16px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-weight:600;
cursor:pointer;
}

.highlight{
background:#facc15;
color:#000;
padding:2px 4px;
border-radius:4px;
}

.rate-badge{
background:#1e293b;
padding:10px 14px;
border-radius:8px;
font-size:13px;
font-weight:600;
color:#38bdf8;
white-space:nowrap;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
<button onclick="copyTable('export')" class="copy-btn">Copy Export Table</button>
<button onclick="copyTable('import')" class="copy-btn">Copy Import Table</button>
<button onclick="copyTable('multiland')" class="copy-btn">Copy Multiland Table</button>

<input type="text" class="search" placeholder="Search..." onkeyup="render()" id="searchInput"/>
<div id="rateDisplay" class="rate-badge">Folyamatban...</div>
</div>

<h2>Export Partners</h2>
<table id="exportTable">
<thead>
<tr>
<th>Status</th><th>Company</th><th>Contact</th><th>Country</th><th>Phone</th><th>Brands</th>
</tr>
</thead>
<tbody id="exportBody"></tbody>
</table>

<h2>Import Partners</h2>
<table id="importTable">
<thead>
<tr>
<th>Status</th><th>Partner</th>
</tr>
</thead>
<tbody id="importBody"></tbody>
</table>

<h2>Multiland Partners</h2>
<table id="multilandTable">
<thead>
<tr>
<th>Status</th><th>Company</th><th>Contact</th><th>Country</th><th>Phone</th><th>Brands</th>
</tr>
</thead>
<tbody id="multilandBody"></tbody>
</table>

</div>

<script>

let eurRate=400;

async function loadRate(){
try{
const res=await fetch("https://open.er-api.com/v6/latest/EUR");
const data=await res.json();
let rate=data?.rates?.HUF;
if(rate){
eurRate=rate;
document.getElementById("rateDisplay").innerText=`1 EUR = ${eurRate.toFixed(2)} HUF`;
}
}catch(e){}
}
loadRate();

const API_URL="https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec";

let allData=[];

async function load(){
const res=await fetch(API_URL+"?_="+Date.now());
allData=await res.json();
render();
}
load();
setInterval(load,15000);

function normalize(r){
return{
company:r.Company||"",
contact:r.Contact||"",
country:r.Country||"",
phone:r.Phone||"",
brands:r.Brands||"",
type:(r.Type||""),
status:r["Státusz"]||""
};
}

function getStatusClass(status){
const s=status.toLowerCase();
if(s.includes("szerződött")) return "signed";
if(s.includes("szerződés")) return "contract";
if(s.includes("termék")) return "discussion";
if(s.includes("nem aktív")) return "inactive";
return "other";
}

function matchSearch(p,term){
const text=(p.company+p.contact+p.country+p.phone+p.brands+p.status).toLowerCase();
return text.includes(term);
}

function highlight(text,term){
if(!term) return text;
return text.replace(new RegExp(`(${term})`,"gi"),'<span class="highlight">$1</span>');
}

function formatBrands(text){
if(!text) return "";
let items=text.split(",");
return items.map(i=>`<span class="brand-tag">${i}</span>`).join("");
}

function splitContactInfo(text){
if(!text) return {phones:[],emails:[]};
let parts=text.split(/[,;]/);
let phones=[],emails=[];
parts.forEach(p=>{
if(p.includes("@")) emails.push(p);
else phones.push(p);
});
return {phones,emails};
}

function render(){

const search=document.getElementById("searchInput").value.toLowerCase();

let rows=allData.map(normalize);
if(search) rows=rows.filter(p=>matchSearch(p,search));

const buyers=rows.filter(r=>r.type.toLowerCase().includes("buyer"));
const sellers=rows.filter(r=>r.type.toLowerCase().includes("seller"));
const multiland=rows.filter(r=>r.type.toLowerCase().includes("multiland"));

let exportHTML="",importHTML="",multilandHTML="";

buyers.forEach(p=>{
exportHTML+=`
<tr class="row-${getStatusClass(p.status)}">
<td>${highlight(p.status,search)}</td>
<td>${highlight(p.company,search)}</td>
<td>${highlight(p.contact,search)}</td>
<td>${highlight(p.country,search)}</td>
<td>${highlight(p.phone,search)}</td>
<td>${formatBrands(p.brands)}</td>
</tr>`;
});

sellers.forEach(p=>{
importHTML+=`
<tr class="row-${getStatusClass(p.status)}">
<td>${highlight(p.status,search)}</td>
<td>${highlight(p.company,search)}</td>
</tr>`;
});

multiland.forEach(p=>{
multilandHTML+=`
<tr class="row-${getStatusClass(p.status)}">
<td>${highlight(p.status,search)}</td>
<td>${highlight(p.company,search)}</td>
<td>${highlight(p.contact,search)}</td>
<td>${highlight(p.country,search)}</td>
<td>${highlight(p.phone,search)}</td>
<td>${formatBrands(p.brands)}</td>
</tr>`;
});

document.getElementById("exportBody").innerHTML=exportHTML;
document.getElementById("importBody").innerHTML=importHTML;
document.getElementById("multilandBody").innerHTML=multilandHTML;

}

function copyTable(type){
let table=document.getElementById(type+"Table");
const range=document.createRange();
range.selectNode(table);
const sel=window.getSelection();
sel.removeAllRanges();
sel.addRange(range);
document.execCommand("copy");
sel.removeAllRanges();
}

</script>

</body>
</html>
