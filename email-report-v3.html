<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Email Report</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#0f172a;
color:#f8fafc;
padding:30px;
}

.wrapper{
max-width:1400px;
margin:auto;
}

.topbar{
display:flex;
gap:10px;
align-items:center;
margin-bottom:20px;
position:sticky;
top:0;
z-index:100;
background:#0f172a;
padding:10px 0;
}

.search{
padding:10px 14px;
border-radius:8px;
border:none;
font-size:14px;
width:260px;
}

h2{
margin-top:40px;
margin-bottom:15px;
font-weight:700;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:12px;
overflow:hidden;
margin-bottom:40px;
}

thead{
background:#334155;
}

th{
padding:14px;
text-align:left;
font-size:13px;
font-weight:600;
}

td{
padding:14px;
font-size:13px;
border-top:1px solid rgba(255,255,255,.05);
white-space:nowrap;
}

td.brands{
white-space:normal;
max-width:420px;
}

/* PRODUCT BOXES */

.brands{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.brand-tag{
background:#0f172a;
border:1px solid rgba(255,255,255,.12);
padding:6px 10px;
border-radius:8px;
font-size:12px;
display:inline-flex;
align-items:center;
gap:6px;
color:white;
}

.brand-tag:hover{
border-color:#38bdf8;
}

.brand-price{
color:#38bdf8;
font-weight:700;
}

/* STATUS COLORS */

.row-contract{
background:#facc15;
color:#000;
}

.row-discussion{
background:#1f4e79;
}

.row-inactive{
background:#7f2d2d;
}

.row-other{
background:#1e293b;
}

.company{
font-weight:600;
}

.copy-btn{
padding:10px 16px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-weight:600;
cursor:pointer;
}

.copy-btn:hover{
background:#0ea5e9;
}

.wa-btn{
background:#25D366;
color:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
font-size:12px;
font-weight:600;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">

<button onclick="copyTable('export')" class="copy-btn">Copy Export Table</button>
<button onclick="copyTable('import')" class="copy-btn">Copy Import Table</button>

<input 
type="text" 
class="search" 
placeholder="Search company, brand, contact..."
onkeyup="render()"
id="searchInput"
/>

</div>

<h2>Export Partners</h2>

<table id="exportTable">
<thead>
<tr>
<th>Status</th>
<th>Company</th>
<th>Contact</th>
<th>Country</th>
<th>Phone</th>
<th>Brands</th>
<th>Status Date</th>
</tr>
</thead>
<tbody id="exportBody"></tbody>
</table>

<h2>Import Partners</h2>

<table id="importTable">
<thead>
<tr>
<th>Status</th>
<th>Company</th>
<th>Contact</th>
<th>Country</th>
<th>Phone</th>
<th>Brands</th>
<th>WhatsApp offers</th>
</tr>
</thead>
<tbody id="importBody"></tbody>
</table>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec";

let allData=[];

function load(){

const script=document.createElement("script");
script.src=API_URL+"?callback=handleData&_="+Date.now();
document.body.appendChild(script);

}

function handleData(data){

allData=data;
render();

}

function normalize(r){

return{
company:r.Company||"",
contact:r.Contact||"",
country:r.Country||"",
phone:r.Phone||"",
brands:r.Brands||"",
type:(r.Type||""),
status:r["Státusz"]||"",
statusDate:r["Státusz változás"]||""
};

}

function formatDate(d){

if(!d) return "";

const date=new Date(d);

if(isNaN(date)) return d;

return date.toISOString().split("T")[0];

}

function getStatusClass(status){

const s=status.toLowerCase();

if(s.includes("szerződés")) return "contract";
if(s.includes("termék")) return "discussion";
if(s.includes("nem aktív") || s.includes("inactive")) return "inactive";
if(s.includes("aktív") || s.includes("active")) return "contract";

return "other";

}

function buyerPriority(status){

const s=status.toLowerCase();

if(s.includes("szerződés")) return 1;
if(s.includes("termék")) return 2;
if(s.includes("drágák")) return 3;
if(s.includes("nem aktív")) return 4;

return 5;

}

function sellerPriority(status){

const s=status.toLowerCase();

if(s.includes("aktív") && !s.includes("nem")) return 1;
if(s.includes("nem aktív")) return 2;

return 3;

}

function matchSearch(p,term){

const text = (
p.company +
p.contact +
p.country +
p.phone +
p.brands +
p.status
).toLowerCase();

return text.includes(term);

}

/* PRODUCT FORMAT */

function formatBrands(text){

if(!text) return "";

let items = text.split(",").map(i=>i.trim());

return items.map(item=>{

let priceMatch = item.match(/(.*?)(\d+[.,]?\d*\s?€?)$/);

if(priceMatch){

let name = priceMatch[1].trim();
let price = priceMatch[2];

return `<span class="brand-tag">${name} <span class="brand-price">${price}</span></span>`;

}

return `<span class="brand-tag">${item}</span>`;

}).join("");

}

function render(){

const search=document.getElementById("searchInput").value.toLowerCase();

let rows=allData.map(normalize);

if(search){
rows=rows.filter(p=>matchSearch(p,search));
}

const buyers=rows.filter(r=>r.type.toLowerCase().includes("buyer"));
const sellers=rows.filter(r=>r.type.toLowerCase().includes("seller"));

buyers.sort((a,b)=>buyerPriority(a.status)-buyerPriority(b.status));
sellers.sort((a,b)=>sellerPriority(a.status)-sellerPriority(b.status));

let exportHTML="";
let importHTML="";

buyers.forEach(p=>{

const statusClass=getStatusClass(p.status);

exportHTML+=`

<tr class="row-${statusClass}">
<td>${p.status}</td>
<td class="company">${p.company}</td>
<td>${p.contact}</td>
<td>${p.country}</td>
<td>${p.phone}</td>
<td class="brands">${formatBrands(p.brands)}</td>
<td>${formatDate(p.statusDate)}</td>
</tr>

`;

});

sellers.forEach(p=>{

const statusClass=getStatusClass(p.status);

let whatsappLink="";

if(p.statusDate){
whatsappLink=`<a href="${p.statusDate}" target="_blank" class="wa-btn">Open WhatsApp</a>`;
}

importHTML+=`

<tr class="row-${statusClass}">
<td>${p.status}</td>
<td class="company">${p.company}</td>
<td>${p.contact}</td>
<td>${p.country}</td>
<td>${p.phone}</td>
<td class="brands">${formatBrands(p.brands)}</td>
<td>${whatsappLink}</td>
</tr>

`;

});

document.getElementById("exportBody").innerHTML=exportHTML;
document.getElementById("importBody").innerHTML=importHTML;

}

load();

setInterval(load,15000);

function copyTable(type){

let table=document.getElementById(type+"Table");

let title=document.createElement("div");

title.style.background="none";
title.style.fontSize="20px";
title.style.fontWeight="700";
title.style.marginBottom="10px";
title.style.color="black";

title.innerText = type==="export"
? "Export Partners"
: "Import Partners";

table.parentNode.insertBefore(title,table);

const range=document.createRange();
range.setStartBefore(title);
range.setEndAfter(table);

const selection=window.getSelection();
selection.removeAllRanges();
selection.addRange(range);

document.execCommand("copy");

selection.removeAllRanges();

title.remove();

}

</script>

</body>
</html>
