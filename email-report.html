<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Email Report</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#0f172a;
color:#f8fafc;
padding:30px;
}

.wrapper{
max-width:1400px;
margin:auto;
}

h2{
margin-top:40px;
margin-bottom:15px;
font-weight:700;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:12px;
overflow:hidden;
margin-bottom:40px;
}

thead{
background:#334155;
}

th{
padding:14px;
text-align:left;
font-size:13px;
font-weight:600;
}

td{
padding:14px;
font-size:13px;
border-top:1px solid rgba(255,255,255,.05);
white-space:nowrap;
}

td.brands{
white-space:normal;
max-width:350px;
line-height:1.4;
}

/* STATUS COLORS */

.row-contract{
background:#facc15;
color:#000;
}

.row-discussion{
background:#1f4e79;
}

.row-inactive{
background:#7f2d2d;
}

.row-other{
background:#1e293b;
}

/* Hover */

tr:hover{
background:#475569;
transition:.15s;
}

.company{
font-weight:600;
}

.copy-btn{
margin-bottom:20px;
margin-right:10px;
padding:10px 16px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-weight:600;
cursor:pointer;
}

.copy-btn:hover{
background:#0ea5e9;
}

</style>

</head>

<body>

<div class="wrapper">

<button onclick="copyTable('exportTable')" class="copy-btn">Copy Export Table</button> <button onclick="copyTable('importTable')" class="copy-btn">Copy Import Table</button>

<h2>Export Partners</h2>

<table id="exportTable">
<thead>
<tr>
<th>Status</th>
<th>Company</th>
<th>Contact</th>
<th>Country</th>
<th>Type</th>
<th>Phone</th>
<th>Brands</th>
<th>Status Date</th>
</tr>
</thead>
<tbody id="exportBody"></tbody>
</table>

<h2>Import Partners</h2>

<table id="importTable">
<thead>
<tr>
<th>Status</th>
<th>Company</th>
<th>Contact</th>
<th>Country</th>
<th>Type</th>
<th>Phone</th>
<th>Brands</th>
<th>Status Date</th>
</tr>
</thead>
<tbody id="importBody"></tbody>
</table>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec";

let allData=[];

function load(){

const script=document.createElement("script");
script.src=API_URL+"?callback=handleData&_="+Date.now();
document.body.appendChild(script);

}

function handleData(data){

allData=data;
render();

}

/* Buyer / Seller átalakítás */

function formatType(type){

const t=type.toLowerCase();

if(t.includes("buyer"))
return "Export";

if(t.includes("seller"))
return "Import";

return type;

}

function normalize(r){

return{
company:r.Company||"",
contact:r.Contact||"",
country:r.Country||"",
phone:r.Phone||"",
brands:r.Brands||"",
type:formatType(r.Type||""),
originalType:(r.Type||""),
status:r["Státusz"]||"",
statusDate:r["Státusz változás"]||""
};

}

function formatDate(d){

if(!d) return "";

const date=new Date(d);

if(isNaN(date)) return d;

return date.toISOString().split("T")[0];

}

function getStatusClass(status,type){

const s=status.toLowerCase();
const t=type.toLowerCase();

/* Seller + Active -> sárga */

if(t.includes("seller") && (s.includes("aktív") || s.includes("active")))
return "contract";

/* SZERZŐDÉS */

if(s.includes("szerződés"))
return "contract";

/* TERMÉK BESZÉLGETÉS */

if(s.includes("termék") || s.includes("beszél"))
return "discussion";

/* NEM AKTÍV */

if(s.includes("nem aktív") || s.includes("inactive"))
return "inactive";

return "other";

}

function render(){

const rows=allData.map(normalize);

let exportHTML="";
let importHTML="";

rows.forEach(p=>{

const statusClass=getStatusClass(p.status,p.originalType);

const row=`

<tr class="row-${statusClass}">

<td>${p.status}</td>
<td class="company">${p.company}</td>
<td>${p.contact}</td>
<td>${p.country}</td>
<td>${p.type}</td>
<td>${p.phone}</td>
<td class="brands">${p.brands}</td>
<td>${formatDate(p.statusDate)}</td>

</tr>

`;

if(p.originalType.toLowerCase().includes("buyer")){
exportHTML+=row;
}

if(p.originalType.toLowerCase().includes("seller")){
importHTML+=row;
}

});

document.getElementById("exportBody").innerHTML=exportHTML;
document.getElementById("importBody").innerHTML=importHTML;

}

load();

setInterval(() => {

load();

}, 15000);

function copyTable(id){

const table=document.getElementById(id);

const range=document.createRange();
range.selectNode(table);

const selection=window.getSelection();
selection.removeAllRanges();
selection.addRange(range);

document.execCommand("copy");

selection.removeAllRanges();

alert("Table copied. You can paste it into email.");

}

</script>

</body>
</html>
