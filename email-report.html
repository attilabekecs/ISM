<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ISM Status Overview</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#0f172a;
color:#f8fafc;
padding:30px;
}

.wrapper{
max-width:1400px;
margin:auto;
}

h1{
margin-bottom:25px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

thead{
background:#334155;
}

th{
text-align:left;
padding:12px;
font-size:13px;
font-weight:600;
}

td{
padding:12px;
font-size:13px;
border-top:1px solid rgba(255,255,255,.05);
}

.company{
font-weight:600;
}

/* STATUS BADGES */

.badge{
padding:4px 10px;
border-radius:999px;
font-size:12px;
font-weight:600;
display:inline-block;
}

/* STATUS COLORS */

.status-waiting{
background:#f59e0b;
color:#111827;
}

.status-negotiation{
background:#3b82f6;
}

.status-confirmed{
background:#22c55e;
}

.status-rejected{
background:#ef4444;
}

/* ROW BACKGROUND COLORS */

.row-waiting{
background:rgba(245,158,11,0.08);
}

.row-negotiation{
background:rgba(59,130,246,0.08);
}

.row-confirmed{
background:rgba(34,197,94,0.08);
}

.row-rejected{
background:rgba(239,68,68,0.08);
}

</style>

</head>

<body>

<div class="wrapper">

<h1>ISM 2026 Partner Status</h1>

<table>

<thead>
<tr>
<th>Status</th>
<th>Company</th>
<th>Contact</th>
<th>Country</th>
<th>Type</th>
<th>Phone</th>
<th>Brands</th>
<th>Status Date</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec";

let allData=[];

function load(){

const s=document.createElement("script");
s.src=API_URL+"?callback=handleData&_="+Date.now();
document.body.appendChild(s);

}

function handleData(data){

allData=data;
render();

}

function normalize(r){

return{
company:r.Company||"",
contact:r.Contact||"",
country:r.Country||"",
phone:r.Phone||"",
brands:r.Brands||"",
type:r.Type||"",
status:r["Státusz"]||"",
statusDate:r["Státusz változás"]||""
};

}

function formatDate(d){

if(!d) return "";

const date=new Date(d);

if(isNaN(date)) return d;

return date.toISOString().split("T")[0];

}

function getStatusClass(status){

const s=status.toLowerCase();

if(s.includes("aláírva") || s.includes("waiting")) return "waiting";
if(s.includes("tárgyalás") || s.includes("negotiation")) return "negotiation";
if(s.includes("confirm")) return "confirmed";
if(s.includes("reject")) return "rejected";

return "negotiation";

}

function render(){

const rows=allData.map(normalize);

let html="";

rows.forEach(p=>{

const statusClass=getStatusClass(p.status);

html+=`
<tr class="row-${statusClass}">

<td>
<span class="badge status-${statusClass}">
${p.status}
</span>
</td>

<td class="company">${p.company}</td>

<td>${p.contact}</td>

<td>${p.country}</td>

<td>${p.type}</td>

<td>${p.phone}</td>

<td>${p.brands}</td>

<td>${formatDate(p.statusDate)}</td>

</tr>
`;

});

document.getElementById("tableBody").innerHTML=html;

}

load();

</script>

</body>
</html>
