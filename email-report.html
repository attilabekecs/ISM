<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ISM Email Status Report</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#0f172a;
padding:30px;
color:#f8fafc;
}

.wrapper{
max-width:1100px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

button{
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.btn-primary{
background:#38bdf8;
color:white;
}

.btn-secondary{
background:#334155;
color:white;
}

.email-box{
background:#1e293b;
border-radius:16px;
padding:20px;
border:1px solid rgba(255,255,255,.06);
}

.status-block{
margin-top:25px;
}

.status-title{
font-weight:700;
font-size:18px;
margin-bottom:10px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:10px;
background:#111827;
border-radius:10px;
padding:10px;
margin-bottom:8px;
font-size:13px;
}

.cell{
background:#1e293b;
padding:6px 10px;
border-radius:6px;
}

.company{
font-weight:700;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="topbar">

<h2>ISM 2026 Email Status Report</h2>

<div>
<button class="btn-primary" onclick="generate()">Generate</button>
<button class="btn-secondary" onclick="copyBox()">Copy</button>
</div>

</div>

<div id="emailBox" class="email-box">
Click Generate
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec";

let allData=[];

function load(){

const s=document.createElement("script");
s.src=API_URL+"?callback=handleData&_="+Date.now();
document.body.appendChild(s);

}

function handleData(data){
allData=data;
}

function normalize(r){

return{
company:r.Company||"",
contact:r.Contact||"",
country:r.Country||"",
email:r.Email||"",
phone:r.Phone||"",
brands:r.Brands||"",
type:r.Type||"",
status:r["Státusz"]||"",
statusDate:r["Státusz változás"]||""
};

}

function generate(){

const rows=allData.map(normalize);

const groups={};

rows.forEach(r=>{

if(!r.status)return;

if(!groups[r.status]) groups[r.status]=[];

groups[r.status].push(r);

});

let html="";

Object.keys(groups).forEach(status=>{

html+=`
<div class="status-block">
<div class="status-title">${status} (${groups[status].length})</div>
`;

groups[status].forEach(p=>{

html+=`
<div class="row">

<div class="cell company">${p.company}</div>

<div class="cell">${p.contact}</div>

<div class="cell">${p.country}</div>

<div class="cell">${p.type}</div>

${p.email?`<div class="cell">${p.email}</div>`:""}

${p.phone?`<div class="cell">${p.phone}</div>`:""}

${p.brands?`<div class="cell">${p.brands}</div>`:""}

${p.statusDate?`<div class="cell">${p.statusDate}</div>`:""}

</div>
`;

});

html+="</div>";

});

document.getElementById("emailBox").innerHTML=html;

}

function copyBox(){

const box=document.getElementById("emailBox");

const range=document.createRange();
range.selectNode(box);

const sel=window.getSelection();
sel.removeAllRanges();
sel.addRange(range);

document.execCommand("copy");

sel.removeAllRanges();

alert("Copied for email");

}

load();

</script>

</body>
</html>
