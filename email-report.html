<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ISM 2026 Partner Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#0f172a;
color:#f8fafc;
padding:30px;
}

.wrapper{
max-width:1400px;
margin:auto;
}

h1{
margin-bottom:25px;
font-weight:700;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:12px;
overflow:hidden;
}

thead{
background:#334155;
}

th{
padding:14px;
text-align:left;
font-size:13px;
font-weight:600;
}

td{
padding:14px;
font-size:13px;
border-top:1px solid rgba(255,255,255,.05);
}

/* STATUS COLORS */

/* SZERZŐDÉS FOLYAMATBAN */

.row-contract{
background:#facc15;
color:#000;
}

/* TERMÉKEKET BESZÉLJÜK */

.row-discussion{
background:#1f4e79;
}

/* NEM AKTÍV */

.row-inactive{
background:#7f2d2d;
}

/* Egyéb */

.row-other{
background:#1e293b;
}

/* Hover */

tr:hover{
background:#475569;
transition:.15s;
}

.company{
font-weight:600;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>ISM 2026 Partner Status</h1>

<table>

<thead>
<tr>
<th>Status</th>
<th>Company</th>
<th>Contact</th>
<th>Country</th>
<th>Type</th>
<th>Phone</th>
<th>Brands</th>
<th>Status Date</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec";

let allData=[];

function load(){

const script=document.createElement("script");
script.src=API_URL+"?callback=handleData&_="+Date.now();
document.body.appendChild(script);

}

function handleData(data){

allData=data;
render();

}

function normalize(r){

return{
company:r.Company||"",
contact:r.Contact||"",
country:r.Country||"",
phone:r.Phone||"",
brands:r.Brands||"",
type:r.Type||"",
status:r["Státusz"]||"",
statusDate:r["Státusz változás"]||""
};

}

function formatDate(d){

if(!d) return "";

const date=new Date(d);

if(isNaN(date)) return d;

return date.toISOString().split("T")[0];

}

function getStatusClass(status){

const s=status.toLowerCase();

/* SZERZŐDÉS FOLYAMATBAN */

if(s.includes("szerződés"))
return "contract";

/* TERMÉK BESZÉLGETÉS */

if(s.includes("termék") || s.includes("beszél"))
return "discussion";

/* NEM AKTÍV */

if(s.includes("nem aktív") || s.includes("inactive"))
return "inactive";

return "other";

}

function render(){

const rows=allData.map(normalize);

let html="";

rows.forEach(p=>{

const statusClass=getStatusClass(p.status);

html+=`

<tr class="row-${statusClass}">

<td>${p.status}</td>

<td class="company">${p.company}</td>

<td>${p.contact}</td>

<td>${p.country}</td>

<td>${p.type}</td>

<td>${p.phone}</td>

<td>${p.brands}</td>

<td>${formatDate(p.statusDate)}</td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=html;

}

setInterval(() => {

load();

}, 15000);

</script>

</body>
</html>
