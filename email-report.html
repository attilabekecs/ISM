<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ISM Status Overview</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#0f172a;
color:#f8fafc;
padding:30px;
}

.wrapper{
max-width:1300px;
margin:auto;
}

h1{
margin-bottom:25px;
}

.status-block{
margin-bottom:40px;
}

.status-title{
font-size:20px;
font-weight:700;
margin-bottom:12px;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

thead{
background:#334155;
}

th{
text-align:left;
padding:10px;
font-size:13px;
}

td{
padding:10px;
font-size:13px;
border-top:1px solid rgba(255,255,255,.05);
}

tr:nth-child(even){
background:#111827;
}

.company{
font-weight:600;
}

</style>

</head>

<body>

<div class="wrapper">

<h1>ISM 2026 Partner Status</h1>

<div id="tableContainer"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec";

let allData=[];

function load(){

const s=document.createElement("script");
s.src=API_URL+"?callback=handleData&_="+Date.now();
document.body.appendChild(s);

}

function handleData(data){

allData=data;
render();

}

function normalize(r){

return{
company:r.Company||"",
contact:r.Contact||"",
country:r.Country||"",
phone:r.Phone||"",
brands:r.Brands||"",
type:r.Type||"",
status:r["Státusz"]||"",
statusDate:r["Státusz változás"]||""
};

}

function formatDate(d){

if(!d) return "";

const date=new Date(d);

if(isNaN(date)) return d;

return date.toISOString().split("T")[0];

}

function render(){

const rows=allData.map(normalize);

const groups={};

rows.forEach(r=>{

if(!r.status) return;

if(!groups[r.status]) groups[r.status]=[];

groups[r.status].push(r);

});

let html="";

Object.keys(groups).forEach(status=>{

html+=`
<div class="status-block">

<div class="status-title">
${status} (${groups[status].length})
</div>

<table>

<thead>
<tr>
<th>Company</th>
<th>Contact</th>
<th>Country</th>
<th>Type</th>
<th>Phone</th>
<th>Brands</th>
<th>Status Date</th>
</tr>
</thead>

<tbody>
`;

groups[status].forEach(p=>{

html+=`
<tr>
<td class="company">${p.company}</td>
<td>${p.contact}</td>
<td>${p.country}</td>
<td>${p.type}</td>
<td>${p.phone}</td>
<td>${p.brands}</td>
<td>${formatDate(p.statusDate)}</td>
</tr>
`;

});

html+=`
</tbody>
</table>
</div>
`;

});

document.getElementById("tableContainer").innerHTML=html;

}

load();

</script>

</body>
</html>
