<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#38bdf8;
--accent-soft:#0ea5e9;
--text:#f1f5f9;
--muted:#94a3b8;
--success:#22c55e;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:var(--card);
border-radius:20px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:1.4rem;
}

.step{
display:none;
animation:fade .3s ease;
}

.step.active{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

label{
font-size:.8rem;
color:var(--muted);
margin-bottom:6px;
display:block;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#0f172a;
color:var(--text);
margin-bottom:14px;
font-size:1rem;
}

.toggle-group{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:20px;
}

.toggle{
background:#0f172a;
border:2px solid transparent;
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
font-weight:600;
}

.toggle.active{
border:2px solid var(--accent);
background:#082f49;
}

.brand-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.brand{
background:#0f172a;
border:2px solid transparent;
border-radius:16px;
padding:18px;
text-align:center;
font-weight:600;
cursor:pointer;
}

.brand.active{
border:2px solid var(--accent);
background:#082f49;
}

.buttons{
margin-top:25px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:16px;
font-weight:600;
cursor:pointer;
font-size:1rem;
}

button:disabled{
cursor:default;
}

.next{
background:linear-gradient(135deg,var(--accent),var(--accent-soft));
color:#fff;
}

.colibri{
background:linear-gradient(135deg,#6c5ce7,#a29bfe);
color:#fff;
margin-bottom:24px;
}

.back{
background:#334155;
color:#fff;
}

.submit{
background:var(--success);
color:#fff;
}

.print{
background:#f59e0b;
color:#fff;
}

#loadingOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader-box{
background:#1e293b;
padding:30px;
border-radius:16px;
font-weight:600;
font-size:1.1rem;
color:white;
text-align:center;
}

#printArea{
display:none;
}

.print-header{
text-align:center;
border-bottom:2px solid #000;
padding-bottom:12px;
margin-bottom:20px;
}

.print-header h2{
margin:0;
font-size:22px;
}

.print-header p{
margin:6px 0 0;
font-size:13px;
color:#333;
}

.print-section{
margin-bottom:18px;
page-break-inside:avoid;
}

.print-section h3{
font-size:15px;
margin:0 0 10px;
border-bottom:1px solid #ccc;
padding-bottom:5px;
}

.print-row{
display:flex;
justify-content:space-between;
gap:20px;
padding:6px 0;
border-bottom:1px solid #eee;
font-size:13px;
}

.print-row span:first-child{
font-weight:600;
color:#333;
}

.print-row span:last-child{
text-align:right;
word-break:break-word;
}

.print-brands{
font-size:13px;
line-height:1.6;
padding-top:4px;
}

#printActions{
display:none;
margin-top:30px;
gap:10px;
}

#printActions button{
padding:16px;
border:none;
border-radius:16px;
font-weight:600;
font-size:1rem;
cursor:pointer;
}

/* PRINT PREVIEW MODE */

body.print-preview{
background:#fff;
color:#000;
padding:0;
display:block;
font-family:Inter, Arial, sans-serif;
}

body.print-preview .container,
body.print-preview #loadingOverlay{
display:none !important;
}

body.print-preview #printArea{
display:block;
max-width:800px;
margin:0 auto;
padding:24px;
}

body.print-preview #printActions{
display:flex;
}

/* REAL PRINT */

@media print{

body{
background:#fff;
color:#000;
padding:0;
display:block;
font-family:Inter, Arial, sans-serif;
}

.container,
#loadingOverlay{
display:none !important;
}

#printArea{
display:block;
padding:24px;
}

#printActions{
display:none !important;
}

@page{
size:A4;
margin:14mm;
}

}

</style>
</head>

<body>

<div class="container">

<div class="buttons">
<button type="button" class="colibri" disabled>Colibri90 Ltd.</button>
</div>

<div class="step active" id="step1">

<label>Company</label>
<input type="text" id="company">

<label>Country</label>
<input type="text" id="country">

<label>Contact Person</label>
<input type="text" id="contact">

<label>Phone</label>
<input type="tel" id="phone">

<label>Email</label>
<input type="email" id="email">

<div class="buttons">
<button type="button" class="next" onclick="nextStep()">Next</button>
</div>

</div>

<div class="step" id="step2">

<label>We are</label>

<div class="toggle-group">
<div class="toggle" onclick="selectToggle(this)">Buyer</div>
<div class="toggle" onclick="selectToggle(this)">Seller</div>
<div class="toggle" onclick="selectToggle(this)">Both</div>
</div>

<label>Brands of Interest</label>

<div class="brand-grid">

<div class="brand">Kinder</div>
<div class="brand">Rio Mare</div>
<div class="brand">Pellini</div>
<div class="brand">Barilla</div>
<div class="brand">Lavazza</div>
<div class="brand">Ferrero</div>
<div class="brand">Milka</div>
<div class="brand">Haribo</div>
<div class="brand">Mars</div>
<div class="brand">Snickers</div>
<div class="brand">KitKat</div>
<div class="brand">Hell</div>
<div class="brand">Red Bull</div>
<div class="brand">XIXO</div>
<div class="brand">Nescafé</div>

</div>

<div class="buttons">
<button type="button" class="back" onclick="prevStep()">Back</button>
<button type="button" class="submit" onclick="submitForm(false)">Save</button>
<button type="button" class="print" onclick="submitForm(true)">Save and Print</button>
</div>

</div>

</div>

<div id="printArea">

<div class="print-header">
<h2>Colibri90 Ltd.</h2>
<p>Contact Form</p>
</div>

<div class="print-section">
<h3>Company Information</h3>

<div class="print-row">
<span>Company</span>
<span id="printCompany"></span>
</div>

<div class="print-row">
<span>Country</span>
<span id="printCountry"></span>
</div>

<div class="print-row">
<span>Contact Person</span>
<span id="printContact"></span>
</div>

<div class="print-row">
<span>Phone</span>
<span id="printPhone"></span>
</div>

<div class="print-row">
<span>Email</span>
<span id="printEmail"></span>
</div>

</div>

<div class="print-section">
<h3>Business Type</h3>

<div class="print-row">
<span>We are</span>
<span id="printType"></span>
</div>

</div>

<div class="print-section">
<h3>Brands of Interest</h3>
<div class="print-brands" id="printBrands"></div>
</div>

<div id="printActions">
<button type="button" class="print" onclick="printNow()">Print now</button>
<button type="button" class="back" onclick="location.reload()">New form</button>
</div>

</div>

<div id="loadingOverlay">
<div class="loader-box">
Saving...
</div>
</div>

<script>

let currentStep = 1;
const totalSteps = 2;

const overlay = document.getElementById("loadingOverlay");

function nextStep(){
if(currentStep < totalSteps){
document.getElementById("step" + currentStep).classList.remove("active");
currentStep++;
document.getElementById("step" + currentStep).classList.add("active");
}
}

function prevStep(){
if(currentStep > 1){
document.getElementById("step" + currentStep).classList.remove("active");
currentStep--;
document.getElementById("step" + currentStep).classList.add("active");
}
}

function selectToggle(el){
document.querySelectorAll(".toggle").forEach(t => t.classList.remove("active"));
el.classList.add("active");
}

document.querySelectorAll(".brand").forEach(brand => {
brand.addEventListener("click", () => {
brand.classList.toggle("active");
});
});

function updatePrintArea(){

document.getElementById("printCompany").innerText =
document.getElementById("company").value || "-";

document.getElementById("printCountry").innerText =
document.getElementById("country").value || "-";

document.getElementById("printContact").innerText =
document.getElementById("contact").value || "-";

document.getElementById("printPhone").innerText =
document.getElementById("phone").value || "-";

document.getElementById("printEmail").innerText =
document.getElementById("email").value || "-";

const activeToggle = document.querySelector(".toggle.active");

document.getElementById("printType").innerText =
activeToggle ? activeToggle.textContent : "-";

const selectedBrands = Array.from(document.querySelectorAll(".brand.active"))
.map(b => b.textContent);

document.getElementById("printBrands").innerText =
selectedBrands.length ? selectedBrands.join(", ") : "-";

}

function showPrintPreview(){
updatePrintArea();
document.body.classList.add("print-preview");
window.scrollTo(0, 0);
}

function printNow(){
updatePrintArea();

setTimeout(() => {
window.print();
}, 100);
}

async function submitForm(printAfter = false){

const loaderBox = overlay.querySelector(".loader-box");

loaderBox.innerText = "Saving...";
overlay.style.display = "flex";

const formData = new FormData();

formData.append("company", document.getElementById("company").value);
formData.append("country", document.getElementById("country").value);
formData.append("contact", document.getElementById("contact").value);

const activeToggle = document.querySelector(".toggle.active");

formData.append(
"type",
activeToggle ? activeToggle.textContent : ""
);

formData.append(
"brands",
Array.from(document.querySelectorAll(".brand.active"))
.map(b => b.textContent)
.join(", ")
);

formData.append("phone", document.getElementById("phone").value);
formData.append("email", document.getElementById("email").value);

try{

await fetch(
"https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec",
{
method:"POST",
mode:"no-cors",
body:formData
}
);

loaderBox.innerText = "Saved";

if(printAfter){

overlay.style.display = "none";
showPrintPreview();

} else {

setTimeout(() => {
location.reload();
}, 800);

}

} catch(error){

overlay.style.display = "none";
alert("Saving failed. Please try again.");

}

}

</script>

</body>
</html>
