<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#38bdf8;
--accent-soft:#0ea5e9;
--text:#f1f5f9;
--muted:#94a3b8;
--success:#22c55e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:var(--card);
border-radius:20px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:1.4rem;
}

.step{
display:none;
animation:fade .3s ease;
}

.step.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:translateY(0)}
}

label{
font-size:.8rem;
color:var(--muted);
margin-bottom:6px;
display:block;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#0f172a;
color:var(--text);
margin-bottom:14px;
font-size:1rem;
}

.toggle-group{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:20px;
}

.toggle{
background:#0f172a;
border:2px solid transparent;
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
font-weight:600;
}

.toggle.active{
border:2px solid var(--accent);
background:#082f49;
}

.brand-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.brand{
background:#0f172a;
border:2px solid transparent;
border-radius:16px;
padding:18px;
text-align:center;
font-weight:600;
cursor:pointer;
}

.brand.active{
border:2px solid var(--accent);
background:#082f49;
}

.buttons{
margin-top:25px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:16px;
font-weight:600;
cursor:pointer;
font-size:1rem;
}

.next{
background:linear-gradient(135deg,var(--accent),var(--accent-soft));
color:#fff;
}

.back{
background:#334155;
color:#fff;
}

.submit{
background:var(--success);
color:#fff;
}

.scan{
width:100%;
padding:14px;
margin-bottom:20px;
background:#38bdf8;
border:none;
border-radius:12px;
color:white;
font-weight:600;
cursor:pointer;
}

#reader{
display:none;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>ISM v0.9</h1>

<button class="scan" onclick="startScanner()">
📷 Scan Contact QR / vCard
</button>

<div id="reader"></div>

<!-- STEP 1 -->

<div class="step active" id="step1">

<label>Company</label>
<input type="text" id="company">

<label>Country</label>
<input type="text" id="country">

<label>Contact Person</label>
<input type="text" id="contact">

<label>Phone</label>
<input type="tel" id="phone">

<label>Email</label>
<input type="email" id="email">

<div class="buttons">
<button class="next" onclick="nextStep()">Next</button>
</div>

</div>

<!-- STEP 2 -->

<div class="step" id="step2">

<label>We are</label>

<div class="toggle-group">
<div class="toggle" onclick="selectToggle(this)">Buyer</div>
<div class="toggle" onclick="selectToggle(this)">Seller</div>
<div class="toggle" onclick="selectToggle(this)">Both</div>
</div>

<label>Brands of Interest</label>

<div class="brand-grid">

<div class="brand">Kinder</div>
<div class="brand">Milka</div>
<div class="brand">Haribo</div>
<div class="brand">Mars</div>
<div class="brand">Snickers</div>
<div class="brand">KitKat</div>
<div class="brand">Hell</div>
<div class="brand">Red Bull</div>
<div class="brand">XIXO</div>
<div class="brand">Nescafé</div>

</div>

<div class="buttons">
<button class="back" onclick="prevStep()">Back</button>
<button class="submit" onclick="submitForm()">Save Lead</button>
</div>

</div>

</div>

<script>

let currentStep = 1
const totalSteps = 2


function nextStep(){

if(currentStep < totalSteps){

document.getElementById("step"+currentStep).classList.remove("active")

currentStep++

document.getElementById("step"+currentStep).classList.add("active")

}

}


function prevStep(){

if(currentStep > 1){

document.getElementById("step"+currentStep).classList.remove("active")

currentStep--

document.getElementById("step"+currentStep).classList.add("active")

}

}


function selectToggle(el){

document.querySelectorAll(".toggle").forEach(t => t.classList.remove("active"))

el.classList.add("active")

}


/* BRAND SELECT */

document.querySelectorAll(".brand").forEach(brand => {

brand.addEventListener("click", () => {

brand.classList.toggle("active")

})

})


/* SUBMIT FORM */

async function submitForm(){

const formData = new FormData()

formData.append("company", document.getElementById("company").value)
formData.append("country", document.getElementById("country").value)
formData.append("contact", document.getElementById("contact").value)

formData.append(
"type",
document.querySelector(".toggle.active")?.textContent || ""
)

formData.append(
"brands",
Array.from(document.querySelectorAll(".brand.active"))
.map(b => b.textContent)
.join(", ")
)

formData.append("phone", document.getElementById("phone").value)
formData.append("email", document.getElementById("email").value)


await fetch(
"https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec",
{
method:"POST",
body:formData
}
)

alert("Lead Saved")

location.reload()

}


/* QR SCANNER */

function startScanner(){

document.getElementById("reader").style.display = "block"

const scanner = new Html5Qrcode("reader")

scanner.start(

{ facingMode:"environment" },

{ fps:10, qrbox:250 },

(decodedText) => {

console.log("QR content:", decodedText)

parseContact(decodedText)

scanner.stop()

document.getElementById("reader").style.display = "none"

}

)

}


/* CONTACT PARSER */

function parseContact(text){

/* VCARD */

if(text.includes("BEGIN:VCARD")){

const name = text.match(/FN:(.*)/)?.[1] || ""
const company = text.match(/ORG:(.*)/)?.[1] || ""
const phone = text.match(/TEL[^:]*:(.*)/)?.[1] || ""
const email = text.match(/EMAIL[^:]*:(.*)/)?.[1] || ""

fillFields(name, company, phone, email)

return

}


/* MECARD */

if(text.startsWith("MECARD:")){

const name = text.match(/N:([^;]*)/)?.[1] || ""
const company = text.match(/ORG:([^;]*)/)?.[1] || ""
const phone = text.match(/TEL:([^;]*)/)?.[1] || ""
const email = text.match(/EMAIL:([^;]*)/)?.[1] || ""

fillFields(name, company, phone, email)

return

}


/* PHONE QR */

if(text.startsWith("tel:")){

document.getElementById("phone").value = text.replace("tel:","")

return

}


/* EMAIL QR */

if(text.startsWith("mailto:")){

document.getElementById("email").value = text.replace("mailto:","")

return

}


/* LINK QR */

if(text.startsWith("http")){

alert("This QR contains a link. Please copy details manually.")

return

}

}


/* FILL FORM FIELDS */

function fillFields(name, company, phone, email){

if(name) document.getElementById("contact").value = name
if(company) document.getElementById("company").value = company
if(phone) document.getElementById("phone").value = phone
if(email) document.getElementById("email").value = email

}

</script>

</body>
</html>
