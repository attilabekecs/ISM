<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ISM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#38bdf8;
  --accent-soft:#0ea5e9;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --success:#22c55e;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  background:var(--card);
  border-radius:20px;
  padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h1{
  text-align:center;
  margin-bottom:20px;
  font-size:1.4rem;
}

.step{
  display:none;
  animation:fade .3s ease;
}

.step.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

label{
  font-size:.8rem;
  color:var(--muted);
  margin-bottom:6px;
  display:block;
}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#0f172a;
  color:var(--text);
  margin-bottom:14px;
  font-size:1rem;
}

.toggle-group{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}

.toggle{
  background:#0f172a;
  border:2px solid transparent;
  padding:14px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.toggle.active{
  border:2px solid var(--accent);
  background:#082f49;
}

.brand-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.brand{
  background:#0f172a;
  border:2px solid transparent;
  border-radius:16px;
  padding:18px;
  text-align:center;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

.brand.active{
  border:2px solid var(--accent);
  background:#082f49;
}

.search{
  margin-bottom:16px;
}

.buttons{
  margin-top:25px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:16px;
  border:none;
  border-radius:16px;
  font-weight:600;
  cursor:pointer;
  font-size:1rem;
}

.next{
  background:linear-gradient(135deg,var(--accent),var(--accent-soft));
  color:#fff;
}

.back{
  background:#334155;
  color:#fff;
}

.submit{
  background:var(--success);
  color:#fff;
}

.progress{
  height:6px;
  background:#0f172a;
  border-radius:8px;
  margin-bottom:20px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:33%;
  background:var(--accent);
  transition:.3s;
}

.success-screen{
  display:none;
  text-align:center;
}

.success-screen.active{
  display:block;
}

.success-screen h2{
  color:var(--success);
}

@media(max-width:480px){
  .brand{
    padding:22px;
    font-size:1rem;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>ISM v0.2</h1>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- STEP 1 -->
<div class="step active" id="step1">
  <label>Company</label>
  <input type="text" id="company">

  <label>Country</label>
  <input type="text" id="country">

  <label>Contact Person</label>
  <input type="text" id="contact">

  <div class="buttons">
    <button class="next" onclick="nextStep()">Next</button>
  </div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <label>We are</label>
  <div class="toggle-group">
    <div class="toggle" onclick="selectToggle(this)">Buyer</div>
    <div class="toggle" onclick="selectToggle(this)">Seller</div>
    <div class="toggle" onclick="selectToggle(this)">Both</div>
  </div>

  <label>Brands of Interest</label>
  <input type="text" class="search" placeholder="Search brand..." onkeyup="filterBrands(this.value)">

  <div class="brand-grid" id="brandGrid">
    <div class="brand">Kinder</div>
    <div class="brand">Milka</div>
    <div class="brand">Haribo</div>
    <div class="brand">Mars</div>
    <div class="brand">Snickers</div>
    <div class="brand">KitKat</div>
    <div class="brand">Hell</div>
    <div class="brand">Red Bull</div>
    <div class="brand">XIXO</div>
    <div class="brand">Nescafé</div>
  </div>

  <div class="buttons">
    <button class="back" onclick="prevStep()">Back</button>
    <button class="next" onclick="nextStep()">Next</button>
  </div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <label>Phone</label>
  <input type="tel">

  <label>Email</label>
  <input type="email">

  <label>Business Card Photo</label>
<input type="file" id="cardPhoto" accept="image/*" capture="environment">

  <div class="buttons">
    <button class="back" onclick="prevStep()">Back</button>
    <button class="submit" onclick="submitForm()">Save Lead</button>
  </div>
</div>

<div class="success-screen" id="successScreen">
  <h2>✔ Lead Saved</h2>
  <p>Ready for next partner.</p>
</div>

</div>

<script>
let currentStep = 1;
const totalSteps = 3;

function updateProgress(){
  const percent = (currentStep/totalSteps)*100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function nextStep(){
  if(currentStep < totalSteps){
    document.getElementById("step"+currentStep).classList.remove("active");
    currentStep++;
    document.getElementById("step"+currentStep).classList.add("active");
    updateProgress();
  }
}

function prevStep(){
  if(currentStep > 1){
    document.getElementById("step"+currentStep).classList.remove("active");
    currentStep--;
    document.getElementById("step"+currentStep).classList.add("active");
    updateProgress();
  }
}

function selectToggle(el){
  document.querySelectorAll(".toggle").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

document.querySelectorAll(".brand").forEach(brand=>{
  brand.addEventListener("click",()=>{
    brand.classList.toggle("active");
  });
});

function filterBrands(value){
  value = value.toLowerCase();
  document.querySelectorAll(".brand").forEach(b=>{
    b.style.display = b.textContent.toLowerCase().includes(value) ? "block":"none";
  });
}

async function submitForm(){

  const button = document.querySelector(".submit");
  button.disabled = true;
  button.innerText = "Saving...";

  const photoInput = document.getElementById("cardPhoto");
  let imageBlob = null;

  if(photoInput.files.length > 0){
    const file = photoInput.files[0];
    imageBlob = await resizeImage(file);
  }

  const formData = new FormData();

  formData.append("company", document.getElementById("company").value);
  formData.append("country", document.getElementById("country").value);
  formData.append("contact", document.getElementById("contact").value);
  formData.append("type", document.querySelector(".toggle.active")?.textContent || "");
  formData.append("brands", JSON.stringify(
    Array.from(document.querySelectorAll(".brand.active")).map(b=>b.textContent)
  ));
  formData.append("phone", document.querySelector('input[type="tel"]').value);
  formData.append("email", document.querySelector('input[type="email"]').value);

  if(imageBlob){
    formData.append("image", imageBlob, "card.jpg");
  }

  try {

    await fetch("https://script.google.com/macros/s/AKfycbzuS2SF8Mg2lagVoGNTFIhiZwolbf-9TPWX8GPS4cgvWAkv6BY4kx-QckMcAjSqTb2OVw/exec", {
      method: "POST",
      mode: "no-cors",
      body: formData
    });

    button.innerText = "Saved ✓";
    setTimeout(()=> location.reload(), 1000);

  } catch(err){
    button.disabled = false;
    button.innerText = "Save Lead";
    alert("Error saving lead.");
  }
}


/* IMAGE RESIZE FUNCTION */

function resizeImage(file){

  return new Promise((resolve) => {

    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.src = e.target.result;
    };

    img.onload = () => {

      const canvas = document.createElement("canvas");
      const maxWidth = 800;

      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      canvas.toBlob(blob=>{
        resolve(blob);
      }, "image/jpeg", 0.7);

    };

    reader.readAsDataURL(file);

  });

}
</script>

</body>
</html>
