<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#38bdf8;
--accent-soft:#0ea5e9;
--text:#f1f5f9;
--muted:#94a3b8;
--success:#22c55e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:var(--card);
border-radius:20px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:1.4rem;
}

.step{
display:none;
animation:fade .3s ease;
}

.step.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:translateY(0)}
}

label{
font-size:.8rem;
color:var(--muted);
margin-bottom:6px;
display:block;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#0f172a;
color:var(--text);
margin-bottom:14px;
font-size:1rem;
}

.toggle-group{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:20px;
}

.toggle{
background:#0f172a;
border:2px solid transparent;
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
font-weight:600;
}

.toggle.active{
border:2px solid var(--accent);
background:#082f49;
}

.brand-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.brand{
background:#0f172a;
border:2px solid transparent;
border-radius:16px;
padding:18px;
text-align:center;
font-weight:600;
cursor:pointer;
}

.brand.active{
border:2px solid var(--accent);
background:#082f49;
}

.buttons{
margin-top:25px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:16px;
font-weight:600;
cursor:pointer;
font-size:1rem;
}

.next{
background:linear-gradient(135deg,var(--accent),var(--accent-soft));
color:#fff;
}

.back{
background:#334155;
color:#fff;
}

.submit{
background:var(--success);
color:#fff;
}

.scan{
width:100%;
padding:14px;
margin-bottom:20px;
background:#38bdf8;
border:none;
border-radius:12px;
color:white;
font-weight:600;
cursor:pointer;
}

#reader{
display:none;
margin-bottom:20px;
}

#loadingOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader-box{
background:#1e293b;
padding:30px;
border-radius:16px;
font-weight:600;
font-size:1.1rem;
color:white;
text-align:center;
}

.whatsapp-btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-weight:600;
cursor:pointer;
font-size:1rem;
margin-top:15px;
background:#38bdf8;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>ISM v1.2</h1>

<button id="scanButton" class="scan" onclick="startScanner()">
📷 Scan Contact QR / vCard
</button>

<button id="closeScanner" class="scan" style="display:none">
Close Scanner
</button>

<div id="reader"></div>

<div class="step active" id="step1">

<label>Company</label>
<input type="text" id="company">

<label>Country</label>
<input type="text" id="country">

<label>Contact Person</label>
<input type="text" id="contact">

<label>Phone</label>
<input type="tel" id="phone">

<label>Email</label>
<input type="email" id="email">

<div class="buttons">
<button class="next" onclick="nextStep()">Next</button>
</div>

</div>

<div class="step" id="step2">

<label>We are</label>

<div class="toggle-group">
<div class="toggle" onclick="selectToggle(this)">Buyer</div>
<div class="toggle" onclick="selectToggle(this)">Seller</div>
<div class="toggle" onclick="selectToggle(this)">Both</div>
</div>

<label>Brands of Interest</label>

<div class="brand-grid">

<div class="brand">Kinder</div>
<div class="brand">Milka</div>
<div class="brand">Haribo</div>
<div class="brand">Mars</div>
<div class="brand">Snickers</div>
<div class="brand">KitKat</div>
<div class="brand">Hell</div>
<div class="brand">Red Bull</div>
<div class="brand">XIXO</div>
<div class="brand">Nescafé</div>

</div>

<div class="buttons">
<button class="back" onclick="prevStep()">Back</button>
<button class="submit" onclick="submitForm()">Save</button>
</div>
<br>
<button class="scan" onclick="openWhatsAppContact()">
💬 Write to Contact (WhatsApp)
</button>

<button class="scan" onclick="openWhatsAppUs()">
💬 Write to Attila on WhatsApp
</button>

</div>

</div>

<div id="loadingOverlay">
<div class="loader-box">
Saving...
</div>
</div>

<script>

let scanner

let currentStep = 1
const totalSteps = 2

const submitButton = document.querySelector(".submit")
const overlay = document.getElementById("loadingOverlay")

let scanButton = null

document.addEventListener("DOMContentLoaded", () => {
scanButton = document.getElementById("scanButton")
})

function nextStep(){

if(currentStep < totalSteps){

document.getElementById("step"+currentStep).classList.remove("active")

currentStep++

document.getElementById("step"+currentStep).classList.add("active")

}

if(currentStep === 2){
scanButton.style.display = "none"
}

}

function prevStep(){

if(currentStep > 1){

document.getElementById("step"+currentStep).classList.remove("active")

currentStep--

document.getElementById("step"+currentStep).classList.add("active")

}

if(currentStep === 1){
scanButton.style.display = "block"
}

}

function selectToggle(el){

document.querySelectorAll(".toggle").forEach(t => t.classList.remove("active"))

el.classList.add("active")

}

document.querySelectorAll(".brand").forEach(brand => {

brand.addEventListener("click", () => {

brand.classList.toggle("active")

})

})

async function submitForm(){

if(submitButton.disabled) return

submitButton.disabled = true
submitButton.innerText = "Saving..."

overlay.style.display = "flex"

try{

const formData = new FormData()

formData.append("company", document.getElementById("company").value)
formData.append("country", document.getElementById("country").value)
formData.append("contact", document.getElementById("contact").value)

formData.append(
"type",
document.querySelector(".toggle.active")?.textContent || ""
)

formData.append(
"brands",
Array.from(document.querySelectorAll(".brand.active"))
.map(b => b.textContent)
.join(", ")
)

formData.append("phone", document.getElementById("phone").value)
formData.append("email", document.getElementById("email").value)

await fetch(
"https://script.google.com/macros/s/AKfycbyJIJ718HHofwJhyyfxJ_qcq1-GcOCNxscZ_sCMsDAThG1vOmTRxWzfs6Vogz30h6nj/exec",
{
method:"POST",
mode:"no-cors",
body:formData
}
)

setTimeout(()=>{

alert("Lead Saved")

location.reload()

},600)

}catch(err){

alert("Error saving lead")

overlay.style.display = "none"

submitButton.disabled = false
submitButton.innerText = "Save"

}

}

function startScanner(){

if(scanner){
try{
scanner.stop()
}catch(e){}
}

document.getElementById("reader").style.display = "block"

scanner = new Html5Qrcode("reader")

document.getElementById("closeScanner").style.display = "block"

scanner.start(

{ facingMode:"environment" },

{ fps:10, qrbox:250 },

(decodedText) => {

parseContact(decodedText)

scanner.stop()

document.getElementById("reader").style.display = "none"
document.getElementById("closeScanner").style.display = "none"

overlay.style.display = "flex"
overlay.querySelector(".loader-box").innerText = "Contact imported"

setTimeout(()=>{
overlay.style.display = "none"
},800)

}

)

}

function parseContact(text){

if(text.includes("BEGIN:VCARD")){

const name = text.match(/FN:(.*)/)?.[1] || ""
const company = text.match(/ORG:(.*)/)?.[1] || ""
const phone = text.match(/TEL[^:]*:(.*)/)?.[1] || ""
const email = text.match(/EMAIL[^:]*:(.*)/)?.[1] || ""

const adr = text.match(/ADR:(.*)/)?.[1] || ""
const country = adr.split(";")[6] || ""

fillFields(name, company, phone, email)

if(country){
document.getElementById("country").value = country
}

return

}

if(text.startsWith("MECARD:")){

const name = text.match(/N:([^;]*)/)?.[1] || ""
const company = text.match(/ORG:([^;]*)/)?.[1] || ""
const phone = text.match(/TEL:([^;]*)/)?.[1] || ""
const email = text.match(/EMAIL:([^;]*)/)?.[1] || ""

fillFields(name, company, phone, email)

return

}

}

function fillFields(name, company, phone, email){

if(name) document.getElementById("contact").value = name
if(company) document.getElementById("company").value = company
if(phone) document.getElementById("phone").value = phone
if(email) document.getElementById("email").value = email

}

document.getElementById("closeScanner").onclick = function(){

if(scanner){
scanner.stop()
}

document.getElementById("reader").style.display = "none"
document.getElementById("closeScanner").style.display = "none"

}

function openWhatsAppContact(){

const phone = document.getElementById("phone").value

if(!phone){
alert("No phone number available")
return
}

const cleanPhone = phone.replace(/\D/g,'')

const message = encodeURIComponent(
"Hello, nice meeting you at ISM."
)

window.open(
"https://wa.me/" + cleanPhone + "?text=" + message,
"_blank"
)

}

function openWhatsAppUs(){

const ourNumber = "36304220151"
const message = encodeURIComponent(
"Hello, I would like to discuss cooperation."
)

window.open(
"https://wa.me/" + ourNumber + "?text=" + message,
"_blank"
)

}

</script>

</body>
</html>
