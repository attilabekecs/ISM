<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISM 2026 Dashboard</title>

<style>
body{
  font-family:Inter,sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

h1{
  margin-bottom:25px;
  font-size:1.4rem;
}

/* STAT GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-bottom:25px;
}

.stat-card{
  background:#1e293b;
  padding:16px;
  border-radius:12px;
  text-align:center;
}

.stat-card h2{
  margin:0;
  font-size:1.4rem;
  color:#38bdf8;
}

.stat-card p{
  margin:5px 0 0;
  font-size:.75rem;
  color:#94a3b8;
}

/* SECTIONS */
.section{
  background:#1e293b;
  padding:16px;
  border-radius:14px;
  margin-bottom:20px;
}

.section h3{
  margin:0 0 12px;
  font-size:1rem;
}

.list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.list-item{
  background:#0f172a;
  padding:10px 12px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  font-size:.85rem;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* DESKTOP ENHANCEMENT */
@media(min-width:768px){
  body{
    padding:40px;
  }

  h1{
    font-size:1.8rem;
  }

  .section{
    padding:22px;
  }

  .list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  }
}
</style>
</head>

<body>

<h1>ISM 2026 Live Dashboard</h1>

<div class="grid">
  <div class="stat-card">
    <h2 id="totalLeads">0</h2>
    <p>Total Leads</p>
  </div>

  <div class="stat-card">
    <h2 id="buyerCount">0</h2>
    <p>Buyers</p>
  </div>

  <div class="stat-card">
    <h2 id="sellerCount">0</h2>
    <p>Sellers</p>
  </div>

  <div class="stat-card">
    <h2 id="bothCount">0</h2>
    <p>Both</p>
  </div>
</div>

<div class="section">
  <h3>Brands</h3>
  <div class="list" id="brandList"></div>
</div>

<div class="section">
  <h3>Countries</h3>
  <div class="list" id="countryList"></div>
</div>

<button onclick="exportExcel()">Download Excel</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx6BKz80SSLgNrpM0AC5xzb369DCJORoNhDB20iQO8Tj9kEvwOjDx2MSLtLU1jypGLZQg/exec";

function loadDataJSONP() {
  const script = document.createElement("script");
  script.src = API_URL + "?callback=handleData";
  document.body.appendChild(script);
}

function handleData(data){

  document.getElementById("totalLeads").innerText = data.length;

  const brandCount = {};
  const countryCount = {};
  let buyer=0, seller=0, both=0;

  data.forEach(row=>{

    if(row.Type === "Buyer") buyer++;
    if(row.Type === "Seller") seller++;
    if(row.Type === "Both") both++;

    if(row.Country){
      countryCount[row.Country] = (countryCount[row.Country]||0)+1;
    }

    if(row.Brands){
      row.Brands.split(",").forEach(b=>{
        b=b.trim();
        if(!b) return;
        brandCount[b] = (brandCount[b]||0)+1;
      });
    }
  });

  document.getElementById("buyerCount").innerText = buyer;
  document.getElementById("sellerCount").innerText = seller;
  document.getElementById("bothCount").innerText = both;

  const brandList = document.getElementById("brandList");
  brandList.innerHTML="";
  Object.entries(brandCount)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([brand,count])=>{
      brandList.innerHTML += `
        <div class="list-item">
          <span>${brand}</span>
          <strong>${count}</strong>
        </div>
      `;
    });

  const countryList = document.getElementById("countryList");
  countryList.innerHTML="";
  Object.entries(countryCount)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([country,count])=>{
      countryList.innerHTML += `
        <div class="list-item">
          <span>${country}</span>
          <strong>${count}</strong>
        </div>
      `;
    });
}

function exportExcel(){
  const sheetID = "1hfipDugo8nIv9j8dBPo5x5RCHe9JpkF4iSigsa-vZIc";
  window.open(
    `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=xlsx`,
    "_blank"
  );
}

document.addEventListener("DOMContentLoaded", loadDataJSONP);
</script>

</body>
</html>
