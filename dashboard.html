<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ISM 2026 Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Inter,sans-serif;
  background:#0f172a;
  color:white;
  padding:30px;
}

h1{margin-bottom:30px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin-bottom:30px;
}

.stat-card{
  background:#1e293b;
  padding:18px;
  border-radius:14px;
  text-align:center;
}

.stat-card h2{
  margin:0;
  font-size:1.6rem;
  color:#38bdf8;
}

.stat-card p{
  margin:6px 0 0;
  font-size:.8rem;
  color:#94a3b8;
}

.section{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  margin-bottom:25px;
}

.section h3{
  margin-bottom:15px;
}

.list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.list-item{
  background:#0f172a;
  padding:10px 14px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  font-size:.85rem;
}

button{
  padding:12px 20px;
  background:#38bdf8;
  border:none;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>ISM 2026 Live Dashboard</h1>

<div class="grid">
  <div class="stat-card">
    <h2 id="totalLeads">0</h2>
    <p>Total Leads</p>
  </div>

  <div class="stat-card">
    <h2 id="buyerCount">0</h2>
    <p>Buyers</p>
  </div>

  <div class="stat-card">
    <h2 id="sellerCount">0</h2>
    <p>Sellers</p>
  </div>

  <div class="stat-card">
    <h2 id="bothCount">0</h2>
    <p>Both</p>
  </div>
</div>

<div class="section">
  <h3>Brands</h3>
  <div class="list" id="brandList"></div>
</div>

<div class="section">
  <h3>Countries</h3>
  <div class="list" id="countryList"></div>
</div>

<button onclick="exportExcel()">Download Excel</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxd-sXmXjItMq6RVl0MlNu4Pd4b8i5u8Wx4okLbRsN4sOW_WXvS8b-lDAvf2E_mfYU-3g/exec";

function loadDataJSONP() {
  const script = document.createElement("script");
  script.src = API_URL + "?callback=handleData";
  document.body.appendChild(script);
}

function handleData(data){

  document.getElementById("totalLeads").innerText = data.length;

  const brandCount = {};
  const countryCount = {};
  let buyer=0, seller=0, both=0;

  data.forEach(row=>{

    // Type count
    if(row.Type === "Buyer") buyer++;
    if(row.Type === "Seller") seller++;
    if(row.Type === "Both") both++;

    // Country count
    if(row.Country){
      countryCount[row.Country] = (countryCount[row.Country]||0)+1;
    }

    // Brand count
    if(row.Brands){
      row.Brands.split(",").forEach(b=>{
        b=b.trim();
        if(!b) return;
        brandCount[b] = (brandCount[b]||0)+1;
      });
    }
  });

  document.getElementById("buyerCount").innerText = buyer;
  document.getElementById("sellerCount").innerText = seller;
  document.getElementById("bothCount").innerText = both;

  // Render brand list
  const brandList = document.getElementById("brandList");
  brandList.innerHTML="";
  Object.entries(brandCount)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([brand,count])=>{
      brandList.innerHTML += `
        <div class="list-item">
          <span>${brand}</span>
          <strong>${count}</strong>
        </div>
      `;
    });

  // Render country list
  const countryList = document.getElementById("countryList");
  countryList.innerHTML="";
  Object.entries(countryCount)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([country,count])=>{
      countryList.innerHTML += `
        <div class="list-item">
          <span>${country}</span>
          <strong>${count}</strong>
        </div>
      `;
    });
}

function exportExcel(){
  const sheetID = "1hfipDugo8nIv9j8dBPo5x5RCHe9JpkF4iSigsa-vZIc";
  window.open(
    `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=xlsx`,
    "_blank"
  );
}

document.addEventListener("DOMContentLoaded", loadDataJSONP);
</script>

</body>
</html>
